scenario: scenarios/homelessness_bcn_touristban.md
T: 3
protocol:
  type: round_robin
  order: shuffle
  seed: 7   # required for reproducibility when order is shuffle
agents:
  # `temperature` is a per-agent sampling knob; any extra backend key is passed
  # through to the provider. Omit it to fall back to DEFAULT_TEMPERATURE (0.7).
  # Keep it well above 0 so agents don't collapse to near-identical proposals.
  - path: agents/aristotle
    backend: { provider: litellm, model: anthropic/claude-sonnet-4-6, temperature: 0.7 }
  - path: agents/mill
    backend: { provider: litellm, model: anthropic/claude-sonnet-4-6, temperature: 0.7 }
  - path: agents/confucius
    #backend: { provider: vllm, base_url: http://10.147.1.1:8004/v1, model: QuantTrio/Qwen3-VL-30B-A3B-Instruct-AWQ, temperature: 0.7 }
    backend: { provider: litellm, model: anthropic/claude-sonnet-4-6, temperature: 0.7 }
output: outputs/transcript_explicit_touristban.jsonl
